# CodeBuild buildspec for CDK deploy (Phase 1 pipeline). AWS CodeBuild reads this from the repo root.
version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.12
      nodejs: 20
    commands:
      - npm install -g aws-cdk@2
      - python3 -m pip install --upgrade pip
      - python3 -m pip install -r requirements.txt
      - python3 -m pip install -r cdk/requirements.txt
  build:
    commands:
      # Pre-build Lambda layer python/ tree so CDK can zip it without Docker (CodeBuild has no Docker daemon by default).
      - python3 -m pip install --no-cache-dir -r cdk/lambda_layer/requirements.txt -t cdk/lambda_layer/python
      - cd cdk && cdk deploy --all --require-approval never
